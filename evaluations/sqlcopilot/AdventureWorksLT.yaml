- Name: Q19
  Commands:
  - Prompt: For two products that are sold together, what is the most frequent combination?
      You must not run the final query, you should only generate the SQL script to
      answer the user question.
    RequiredEvaluations:
    - Criteria: LLMCheck
      Parameters:
        CheckName: Correctness
        Definition: This is the expected query ```SELECT TOP 1 A.ProductID AS ProductID1,
          B.ProductID AS ProductID2, COUNT(*) AS Frequency FROM SalesLT.SalesOrderDetail
          A INNER JOIN SalesLT.SalesOrderDetail B ON A.SalesOrderID = B.SalesOrderID
          AND A.ProductID < B.ProductID GROUP BY A.ProductID, B.ProductID ORDER BY
          Frequency DESC;```, your answer should contain a SQL query that can be
          used to answer the user question and will generate the same results of the
          expected query.
