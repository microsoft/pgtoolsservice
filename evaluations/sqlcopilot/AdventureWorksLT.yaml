    RequiredEvaluations:
    - Criteria: LLMCheck
      Parameters:
        CheckName: Correctness
        Definition: This is the expected query ```SELECT TOP 5 p.Name, SUM(od.OrderQty)
          AS TotalQuantity FROM [SalesLT].[Product] p JOIN [SalesLT].[SalesOrderDetail]
