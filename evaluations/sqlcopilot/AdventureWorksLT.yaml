- Name: Q26
  Commands:
  - Prompt: What is the average time between a customers orders for each customer?
      You must not run the final query, you should only generate the SQL script to
      answer the user question.
    RequiredEvaluations:
    - Criteria: LLMCheck
      Parameters:
        CheckName: Correctness
        Definition: This is the expected query ```WITH CustomerOrders AS ( SELECT
          CustomerID, OrderDate, LAG(OrderDate) OVER (PARTITION BY CustomerID ORDER
          BY OrderDate) as PreviousOrderDate FROM [AdventureWorksLT2022].[SalesLT].[SalesOrderHeader]
          ) SELECT CustomerID, AVG(DATEDIFF(DAY, PreviousOrderDate, OrderDate)) as
          AverageDaysBetweenOrders FROM CustomerOrders WHERE PreviousOrderDate IS
          NOT NULL GROUP BY CustomerID;```, your answer should contain a SQL query
          that can be used to answer the user question and will generate the same
          results of the expected query.
- Name: Q27
  Commands:
  - Prompt: How has the quarterly sales trend been since the beginning year 2008?
      You must not run the final query, you should only generate the SQL script to
      answer the user question.
    RequiredEvaluations:
    - Criteria: LLMCheck
      Parameters:
        CheckName: Correctness
        Definition: This is the expected query ```WITH SalesData AS ( SELECT DATEPART(YEAR,
          OrderDate) AS Year, DATEPART(QUARTER, OrderDate) AS Quarter, SUM(TotalDue)
          AS TotalSales FROM [SalesLT].[SalesOrderHeader] WHERE OrderDate >= '2008-01-01'
          GROUP BY DATEPART(YEAR, OrderDate), DATEPART(QUARTER, OrderDate) ) SELECT
          Year, Quarter, TotalSales FROM SalesData ORDER BY Year, Quarter;```, your
          answer should contain a SQL query that can be used to answer the user question
          and will generate the same results of the expected query.
- Name: Q28
  Commands:
  - Prompt: How much total sales has each product category generated each year? You
      must not run the final query, you should only generate the SQL script to answer
      the user question.
    RequiredEvaluations:
    - Criteria: LLMCheck
      Parameters:
        CheckName: Correctness
        Definition: This is the expected query ```SELECT YEAR(soh.OrderDate) AS Year,
          pc.Name AS Category, SUM(sod.LineTotal) AS TotalSales FROM [SalesLT].[SalesOrderHeader]
          soh JOIN [SalesLT].[SalesOrderDetail] sod ON soh.SalesOrderID = sod.SalesOrderID
          JOIN [SalesLT].[Product] p ON sod.ProductID = p.ProductID JOIN [SalesLT].[ProductCategory]
          pc ON p.ProductCategoryID = pc.ProductCategoryID GROUP BY YEAR(soh.OrderDate),
          pc.Name ORDER BY YEAR(soh.OrderDate), pc.Name;```, your answer should contain
          a SQL query that can be used to answer the user question and will generate
          the same results of the expected query.
- Name: Q29
  TestColor: Red
  Commands:
  - Prompt: Find the sales orders that have the lowest shipping cost per unit .You
      must not run the final query, you should only generate the SQL script to answer
      the user question.
    RequiredEvaluations:
    - Criteria: LLMCheck
      Parameters:
        CheckName: Correctness
        Definition: This is the expected query ```SELECT soh.SalesOrderID, SUM(sod.OrderQty)
          AS TotalQuantity, SUM(soh.Freight) AS TotalFreight, CASE WHEN SUM(sod.OrderQty)
          = 0 THEN 0 ELSE SUM(soh.Freight) / SUM(sod.OrderQty) END AS ShippingCostPerUnit
          FROM SalesLT.SalesOrderHeader AS soh JOIN SalesLT.SalesOrderDetail AS sod
          ON soh.SalesOrderID = sod.SalesOrderID GROUP BY soh.SalesOrderID ORDER BY
          ShippingCostPerUnit ASC```, your answer should contain a SQL query that
          can be used to answer the user question and will generate the same results
          of the expected query.
