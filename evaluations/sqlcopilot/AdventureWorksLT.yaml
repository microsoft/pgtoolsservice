    RequiredEvaluations:
    - Criteria: LLMCheck
      Parameters:
        CheckName: Correctness
        Definition: This is the expected query ```SELECT DISTINCT c.CompanyName FROM
          [SalesLT].[Customer] c JOIN [SalesLT].[CustomerAddress] ca ON c.CustomerID
          = ca.CustomerID JOIN [SalesLT].[Address] a ON ca.AddressID = a.AddressID
          WHERE a.CountryRegion = 'United States' AND LEFT(c.CompanyName, 1) = RIGHT(c.CompanyName,
          1) AND c.CompanyName IS NOT NULL;```, your answer should contain a SQL
          query that can be used to answer the user question and will generate the
          same results of the expected query.
- Name: Q16
  TestColor: Probation
