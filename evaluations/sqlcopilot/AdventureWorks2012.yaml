- Name: Q5
  TestColor: Probation
  Commands:
  - Prompt: find the total quantity for locationid smaller than 10 multiplied by 10
      .You must not run the final query, you should only return the generated SQL
      script to answer the user question.
    RequiredEvaluations:
    - Criteria: LLMCheck
      Parameters:
        CheckName: Correctness
        Definition: This is the expected query ```SELECT SUM(Quantity) * 10 AS TotalQuantity
          FROM Production.ProductInventory WHERE LocationID < 10```, your answer should
          contain a SQL query that can be used to answer the user question and will
          generate the same results of the expected query.
- Name: Q6
  Commands:
  - Prompt: what are the cumulative distribution and percent rank of employees' pay
      rates within a Information Services department. Return department, last name,
      rate, cumulative distribution use CUME_DIST function and percent rank of rate.
      Only use EmployeePayHistory and vEmployeeDepartmentHistory table in your answer.
      .You must not run the final query, you should only return the generated SQL
      script to answer the user question.
    RequiredEvaluations:
    - Criteria: LLMCheck
      Parameters:
        CheckName: Correctness
        Definition: This is the expected query ```SELECT Department, LastName, Rate,
          CUME_DIST () OVER (PARTITION BY Department ORDER BY Rate) AS CumeDist, PERCENT_RANK()
          OVER (PARTITION BY Department ORDER BY Rate) AS PctRank FROM HumanResources.vEmployeeDepartmentHistory
          AS edh INNER JOIN HumanResources.EmployeePayHistory AS e ON e.BusinessEntityID
          = edh.BusinessEntityID WHERE Department IN ('Information Services') ORDER
          BY Department, Rate DESC;```, your answer should contain a SQL query that
          can be used to answer the user question and will generate the same results
          of the expected query.
- Name: Q7
  Commands:
  - Prompt: what are the names of all products. You must not run the final query,
      you should only return the generated SQL script to answer the user question.
    RequiredEvaluations:
    - Criteria: LLMCheck
      Parameters:
        CheckName: Correctness
        Definition: This is the expected query ```SELECT Name FROM [AdventureWorks2012].[Production].[Product];```,
          your answer should contain a SQL query that can be used to answer the user
          question and will generate the same results of the expected query.
- Name: Q8
  Commands:
  - Prompt: Find the product name that have been ordered by the same customer more
      than once in the same year and month using CTE. You must not run the final query,
      you should only return the generated SQL script to answer the user question.
    RequiredEvaluations:
    - Criteria: LLMCheck
      Parameters:
        CheckName: Correctness
        Definition: This is the expected query ```WITH CustomerProductOrders AS (
          SELECT so.CustomerID, sod.ProductID, YEAR(so.OrderDate) AS OrderYear, MONTH(so.OrderDate)
          AS OrderMonth, COUNT(*) AS OrderCount FROM Sales.SalesOrderHeader AS so
          JOIN Sales.SalesOrderDetail AS sod ON so.SalesOrderID = sod.SalesOrderID
          GROUP BY so.CustomerID, sod.ProductID, YEAR(so.OrderDate), MONTH(so.OrderDate)
          HAVING COUNT(*) > 1 ) SELECT p.Name FROM CustomerProductOrders AS cpo JOIN
          Production.Product AS p ON cpo.ProductID = p.ProductID;```, your answer
          should contain a SQL query that can be used to answer the user question
          and will generate the same results of the expected query.
- Name: Q9
  Commands:
  - Prompt: find the persons whose last name starts with letter 'L'. Return BusinessEntityID,
      FirstName, LastName, and PhoneNumber. Sort the result on lastname and firstname
      .You must not run the final query, you should only return the generated SQL
      script to answer the user question.
    RequiredEvaluations:
    - Criteria: LLMCheck
      Parameters:
        CheckName: Correctness
        Definition: This is the expected query ```SELECT p.BusinessEntityID, FirstName,
          LastName, PhoneNumber AS Person_Phone FROM Person.Person AS p JOIN Person.PersonPhone
          AS ph ON p.BusinessEntityID  = ph.BusinessEntityID WHERE LastName LIKE 'L%'
          ORDER BY LastName, FirstName;```, your answer should contain a SQL query
          that can be used to answer the user question and will generate the same
          results of the expected query.
