# yaml-language-server: $schema=..\..\GenericEvaluation\TestModels\TestSetSchema.json
ShortName: AWDW-S
Description: AdventureWorksDWSales
TestSetup:
  DatabaseToRestore: AdventureWorksDW2014.bak
  CartridgeExperience: SSMS_SQLEditorChat
TestCases:
- Name: Q0
  Commands:
  - Prompt: show total internet sales for currency code CAD.
    RequiredEvaluations:
    - Criteria: LLMCheck
      Parameters:
        CheckName: Correctness
        Definition: The total sales for the currency code CAD is 1,806,517.4446.
- Name: Q5
  Commands:
  - Prompt: what was the number of internet sales by year in Clothing category?
    RequiredEvaluations:
    - Criteria: LLMCheck
      Parameters:
        CheckName: Correctness
        Definition: 'The number of sales in the Clothing category by year are as follows:

          - In 2012, there were 22 sales.

          - In 2013, there were 8,686 sales.

          - In 2014, there were 393 sales.'
- Name: Q6
  Commands:
  - Prompt: Year with the highest internet sales?
    RequiredEvaluations:
    - Criteria: LLMCheck
      Parameters:
        CheckName: Correctness
        Definition: The year with the highest sales is 2013.
- Name: Q7
  TestColor: Probation
  Commands:
  - Prompt: Show monthly total and year-to-date total internet sales. Order by year and month.
    RequiredEvaluations:
    - Criteria: LLMCheck
      Parameters:
        CheckName: Correctness
        Definition: 'The query results provide a detailed breakdown of monthly sales
          and cumulative year-to-date sales from December 2010 to January 2014. Here
          is a summary of the results:


          - In December 2010, the monthly sales were $43,421.04, which is also the
          cumulative total for that year.

          - In 2011, the monthly sales started at $469,823.91 in January and increased
          to $669,431.50 by December, with a cumulative total of $7,075,525.93 by
          the end of the year.

          - In 2012, the monthly sales began at $495,364.13 in January and rose to
          $624,502.17 by December, resulting in a cumulative total of $5,842,485.20
          for the year.

          - In 2013, the monthly sales were $857,689.91 in January and peaked at $1,874,360.29
          in December, with a cumulative total of $16,351,550.34 by the end of the
          year.

          - In January 2014, the monthly sales were $45,694.72, which is also the
          cumulative total for that year up to that point.


          The data is ordered by year and month, showing a clear progression of sales
          over time.'
- Name: Q8
  TestColor: Probation
  Commands:
  - Prompt: Show me a matrix of internet sales. List product categories as the rows and the years 2011 through 2014 as the columns.
    RequiredEvaluations:
