- Name: Q15
  Commands:
  - Prompt: show total sales for Canadian Dollar for January 2013 in product category
      Bikes. You must not run the final query, you should only return the generated
      SQL script to answer the user question.
    RequiredEvaluations:
    - Criteria: LLMCheck
      Parameters:
        CheckName: Correctness
        Definition: This is the expected query ```SELECT SUM(s.SalesAmount) AS TotalSales
          FROM   [dbo].[DimProductCategory] AS pc INNER JOIN [dbo].[DimProductSubcategory]
          AS ps ON pc.ProductCategoryKey = ps.ProductCategoryKey INNER JOIN [dbo].[DimProduct]
          AS p ON ps.ProductSubcategoryKey = p.ProductSubcategoryKey INNER JOIN [dbo].[FactInternetSales]
          AS s ON p.ProductKey = s.ProductKey INNER JOIN [dbo].[DimCurrency] AS c
          ON s.CurrencyKey = c.CurrencyKey INNER JOIN [dbo].[DimDate] AS d ON s.OrderDateKey
          = d.DateKey WHERE  c.CurrencyName = 'Canadian Dollar' AND d.EnglishMonthName
          = 'January' AND d.CalendarYear = 2013 AND pc.EnglishProductCategoryName
          = 'Bikes';```, your answer should contain a SQL query that can be used
          to answer the user question and will generate the same results of the expected
          query.
- Name: Q16
  Commands:
  - Prompt: how many sales were there for Canadian Dollar for January 2013 in product
      category Bikes. You must not run the final query, you should only return the
      generated SQL script to answer the user question.
    RequiredEvaluations:
    - Criteria: LLMCheck
      Parameters:
        CheckName: Correctness
        Definition: This is the expected query ```SELECT COUNT(*) AS TotalSales FROM   FactInternetSales
          AS fis INNER JOIN DimCurrency AS dc ON fis.CurrencyKey = dc.CurrencyKey
          INNER JOIN DimDate AS dd ON fis.OrderDateKey = dd.DateKey INNER JOIN DimProduct
          AS dp ON fis.ProductKey = dp.ProductKey INNER JOIN DimProductSubcategory
          AS dps ON dp.ProductSubcategoryKey = dps.ProductSubcategoryKey INNER JOIN
          DimProductCategory AS dpc ON dps.ProductCategoryKey = dpc.ProductCategoryKey
          WHERE  dc.CurrencyName = 'Canadian Dollar' AND dd.EnglishMonthName = 'January'
          AND dd.CalendarYear = 2013 AND dpc.EnglishProductCategoryName = 'Bikes';```,
          your answer should contain a SQL query that can be used to answer the user
          question and will generate the same results of the expected query.
